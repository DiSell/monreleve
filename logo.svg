<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 490" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1e40af" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- ── Document ── -->
  <path d="M153,95 L298,95 L343,140 L343,315 Q343,328 330,328 L154,328 Q136,328 136,315 L136,112 Q136,95 153,95 Z"
        fill="white" stroke="#2563eb" stroke-width="6" filter="url(#sh)"/>
  <!-- Coin replié (dog-ear) -->
  <path d="M298,95 L298,140 L343,140 Z" fill="#1d4ed8"/>
  <line x1="298" y1="95" x2="298" y2="140" stroke="#2563eb" stroke-width="3"/>

  <!-- ── Horloge — anneau bleu ── -->
  <circle cx="235" cy="118" r="73" fill="#2563eb" filter="url(#sh)"/>
  <!-- Cadran blanc -->
  <circle cx="235" cy="118" r="63" fill="white"/>
  <!-- Graduations 12h/3h/6h/9h -->
  <g stroke="#334155" stroke-width="5" stroke-linecap="round">
    <line x1="235" y1="56"  x2="235" y2="67"/>
    <line x1="298" y1="118" x2="287" y2="118"/>
    <line x1="235" y1="180" x2="235" y2="169"/>
    <line x1="172" y1="118" x2="183" y2="118"/>
  </g>
  <!-- Aiguille des heures (10h) -->
  <line x1="235" y1="118" x2="204" y2="100" stroke="#1b2b4b" stroke-width="8" stroke-linecap="round"/>
  <!-- Aiguille des minutes (~2h) -->
  <line x1="235" y1="118" x2="278" y2="96"  stroke="#1b2b4b" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Centre -->
  <circle cx="235" cy="118" r="8" fill="#1b2b4b"/>

  <!-- ── Ligne 1 — Personne ── -->
  <circle cx="168" cy="204" r="7" fill="#2563eb"/>
  <path d="M156,222 C156,210 180,210 180,222 Z" fill="#2563eb"/>
  <line x1="193" y1="204" x2="292" y2="204" stroke="#ccd8ed" stroke-width="6" stroke-linecap="round"/>
  <line x1="193" y1="217" x2="268" y2="217" stroke="#ccd8ed" stroke-width="6" stroke-linecap="round"/>

  <!-- ── Ligne 2 — Fourchette (repas) ── -->
  <g stroke="#2563eb" stroke-linecap="round" stroke-width="2.8" fill="none">
    <line x1="163" y1="233" x2="163" y2="244"/>
    <line x1="168" y1="233" x2="168" y2="244"/>
    <line x1="173" y1="233" x2="173" y2="244"/>
    <line x1="163" y1="244" x2="173" y2="244"/>
    <line x1="168" y1="244" x2="168" y2="254"/>
  </g>
  <line x1="193" y1="240" x2="292" y2="240" stroke="#ccd8ed" stroke-width="6" stroke-linecap="round"/>
  <line x1="193" y1="253" x2="268" y2="253" stroke="#ccd8ed" stroke-width="6" stroke-linecap="round"/>

  <!-- ── Ligne 3 — Bus (transport) ── -->
  <rect x="160" y="267" width="18" height="13" rx="2.5" fill="none" stroke="#2563eb" stroke-width="2.8"/>
  <line x1="160" y1="272" x2="178" y2="272" stroke="#2563eb" stroke-width="2" opacity="0.4"/>
  <circle cx="164" cy="282" r="2.5" fill="#2563eb"/>
  <circle cx="175" cy="282" r="2.5" fill="#2563eb"/>
  <line x1="193" y1="270" x2="292" y2="270" stroke="#ccd8ed" stroke-width="6" stroke-linecap="round"/>
  <line x1="193" y1="283" x2="268" y2="283" stroke="#ccd8ed" stroke-width="6" stroke-linecap="round"/>

  <!-- ── Ligne 4 — Euro (salaire) ── -->
  <text x="168" y="303" text-anchor="middle" font-size="17" font-weight="700" fill="#2563eb">€</text>
  <line x1="193" y1="297" x2="292" y2="297" stroke="#ccd8ed" stroke-width="6" stroke-linecap="round"/>
  <line x1="193" y1="310" x2="268" y2="310" stroke="#ccd8ed" stroke-width="6" stroke-linecap="round"/>

  <!-- ── Badge ✓ ── -->
  <circle cx="318" cy="291" r="37" fill="#2563eb" filter="url(#sh)"/>
  <path d="M305,291 L315,302 L334,276" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Texte TimePro ── -->
  <text x="240" y="420" text-anchor="middle" font-size="76" font-weight="800" letter-spacing="-1">
    <tspan fill="#1b2b4b">Time</tspan><tspan fill="#2563eb">Pro</tspan>
  </text>
</svg>
