<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#1e40af" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Document -->
  <path d="M42,30 L142,30 L178,66 L178,210 Q178,222 166,222 L42,222 Q30,222 30,210 L30,42 Q30,30 42,30 Z"
        fill="white" stroke="#2563eb" stroke-width="5" filter="url(#sh)"/>
  <path d="M142,30 L142,66 L178,66 Z" fill="#1d4ed8"/>
  <line x1="142" y1="30" x2="142" y2="66" stroke="#2563eb" stroke-width="2.5"/>

  <!-- Horloge anneau -->
  <circle cx="104" cy="80" r="52" fill="#2563eb" filter="url(#sh)"/>
  <circle cx="104" cy="80" r="44" fill="white"/>
  <!-- Graduations -->
  <g stroke="#334155" stroke-width="4" stroke-linecap="round">
    <line x1="104" y1="37" x2="104" y2="46"/>
    <line x1="148" y1="80" x2="139" y2="80"/>
    <line x1="104" y1="123" x2="104" y2="114"/>
    <line x1="60"  y1="80" x2="69"  y2="80"/>
  </g>
  <!-- Aiguille heures (10h) -->
  <line x1="104" y1="80" x2="82" y2="67" stroke="#1b2b4b" stroke-width="6" stroke-linecap="round"/>
  <!-- Aiguille minutes (~2h) -->
  <line x1="104" y1="80" x2="128" y2="66" stroke="#1b2b4b" stroke-width="4" stroke-linecap="round"/>
  <circle cx="104" cy="80" r="6" fill="#1b2b4b"/>

  <!-- Lignes document -->
  <g stroke="#ccd8ed" stroke-width="5" stroke-linecap="round">
    <line x1="52" y1="148" x2="156" y2="148"/>
    <line x1="52" y1="163" x2="136" y2="163"/>
    <line x1="52" y1="178" x2="156" y2="178"/>
    <line x1="52" y1="193" x2="130" y2="193"/>
  </g>

  <!-- Badge ✓ -->
  <circle cx="162" cy="174" r="28" fill="#2563eb" filter="url(#sh)"/>
  <path d="M151,174 L159,183 L175,161" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
